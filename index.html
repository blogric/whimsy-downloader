<!DOCTYPE html>
<html>
<head>
<title>Ultimate Downloader</title>
</head>
<body>

<h2>Bulk Video Downloader</h2>

<textarea id="links" rows="10" cols="60"></textarea><br>
<button onclick="start()">Start</button>

<div id="output"></div>

<script>
async function start(){
    let raw = document.getElementById("links").value;
    let links = raw.split("\n").filter(x=>x.trim()!="");

    let res = await fetch("/bulk",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({links})
    });

    let data = await res.json();
    let html = "";

    data.forEach(d=>{
        if(d.video && d.video !== "Failed"){
            html += `<p><a href="${d.video}" target="_blank">Download</a></p>`;
        } else {
            html += `<p>Failed</p>`;
        }
    });

    document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
