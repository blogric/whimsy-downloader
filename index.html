<!DOCTYPE html>
<html>
<head>
<title>AI Video Downloader</title>
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0A0F2C, #1a1f4c);
  color: #fff;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: 80px auto;
  padding: 30px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  box-shadow: 0 0 30px rgba(0,212,255,0.3);
}

h1 {
  color: #00D4FF;
}

textarea {
  width: 100%;
  height: 150px;
  border-radius: 10px;
  border: none;
  padding: 15px;
  font-size: 14px;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  background: #00D4FF;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00aacc;
}

.result {
  margin-top: 20px;
  text-align: left;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

a {
  color: #00ff88;
}
</style>
</head>
<body>

<div class="container">
  <h1>🚀 Bulk Video Downloader</h1>

  <textarea id="links" placeholder="Paste links (one per line)"></textarea>

  <button onclick="start()">Download</button>

  <div id="output" class="result"></div>
</div>

<script>
async function start(){
    let raw = document.getElementById("links").value;
    let links = raw.split("\n").filter(x=>x.trim()!="");

    let res = await fetch("/bulk",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({links})
    });

    let data = await res.json();
    let html = "";

    data.forEach(d=>{
        if(d.video && d.video !== "Failed"){
            html += `<div class="card">
                        ✅ <a href="${d.video}" target="_blank">Download Video</a>
                     </div>`;
        } else {
            html += `<div class="card">❌ Failed</div>`;
        }
    });

    document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
