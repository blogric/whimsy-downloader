<!DOCTYPE html>
<html>
<head>
  <title>RedNote Video Downloader</title>
</head>
<body>

<h2>RedNote Downloader</h2>

<input type="text" id="url" placeholder="Paste link here" size="50">
<button onclick="download()">Download</button>

<p id="result"></p>

<script>
async function download() {
  let url = document.getElementById("url").value;

  let res = await fetch(`/download?url=${encodeURIComponent(url)}`);
  let data = await res.json();

  if (data.video) {
    document.getElementById("result").innerHTML =
      `<a href="${data.video}" target="_blank">Download MP4</a>`;
  } else {
    document.getElementById("result").innerText = "Failed!";
  }
}
</script>

</body>
</html>
