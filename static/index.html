<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Whimsy — RedNote Downloader</title>
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111;
  --bg3: #1a1a1a;
  --border: #222;
  --border2: #2e2e2e;
  --text: #f0f0f0;
  --muted: #555;
  --muted2: #888;
  --accent: #ff2d55;
  --accent2: #ff6b35;
  --green: #34c759;
  --blue: #0a84ff;
  --yellow: #ffd60a;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', -apple-system, sans-serif;
  min-height: 100vh;
  padding: 30px 16px 60px;
}
.wrap { max-width: 680px; margin: 0 auto; }

/* Header */
.header { margin-bottom: 32px; }
.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.logo { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.title { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #fff 30%, var(--muted2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { font-size: 13px; color: var(--muted2); margin-left: 50px; }
.version-badge { display: inline-block; background: rgba(255,45,85,.12); border: 1px solid rgba(255,45,85,.25); color: var(--accent); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; letter-spacing: .06em; margin-left: 8px; vertical-align: middle; }

/* Cards */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.card-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.icon-input { background: rgba(10,132,255,.15); }
.icon-links { background: rgba(52,199,89,.15); }
.icon-queue { background: rgba(255,214,10,.12); }
.card-label { font-size: 13px; font-weight: 600; color: var(--muted2); letter-spacing: .03em; }

/* Textarea */
textarea {
  width: 100%;
  min-height: 120px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px;
  font-size: 13px;
  font-family: 'Consolas', 'Courier New', monospace;
  color: var(--text);
  resize: vertical;
  outline: none;
  transition: border .2s;
  line-height: 1.6;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--muted); }

/* Options row */
.opts-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
.opt-group { flex: 1; min-width: 140px; }
.opt-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; display: block; }
select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  cursor: pointer;
}

/* Detected links */
.links-summary { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.count-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; padding: 4px 12px;
  border-radius: 999px;
}
.badge-green { background: rgba(52,199,89,.12); border: 1px solid rgba(52,199,89,.25); color: var(--green); }
.badge-red   { background: rgba(255,45,85,.12);  border: 1px solid rgba(255,45,85,.25);  color: var(--accent); }
.badge-blue  { background: rgba(10,132,255,.12); border: 1px solid rgba(10,132,255,.25); color: var(--blue); }

.link-list { display: flex; flex-direction: column; gap: 4px; }
.link-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; font-size: 12px;
  font-family: monospace;
}
.link-num { color: var(--muted); min-width: 22px; font-weight: 600; }
.link-url { color: var(--blue); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Main button */
.main-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-bottom: 12px;
  transition: opacity .2s, transform .1s;
  letter-spacing: .02em;
}
.main-btn:hover { opacity: .88; }
.main-btn:active { transform: scale(.99); }
.main-btn:disabled { opacity: .35; cursor: not-allowed; }

/* Progress */
.progress-section { margin-bottom: 12px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-label { font-size: 13px; color: var(--muted2); }
.progress-count { font-size: 13px; font-weight: 700; color: var(--text); }
.progress-track { background: var(--bg3); border-radius: 999px; height: 6px; overflow: hidden; margin-bottom: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; transition: width .4s ease; }
.current-url { font-size: 11px; color: var(--muted); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Queue items */
.queue-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  margin-bottom: 8px; transition: border .2s;
}
.queue-item.success { border-color: rgba(52,199,89,.3); }
.queue-item.error   { border-color: rgba(255,45,85,.3); }
.queue-item.running { border-color: rgba(255,214,10,.3); }

.q-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.q-icon.pending { background: var(--bg2); color: var(--muted); }
.q-icon.running { background: rgba(255,214,10,.12); color: var(--yellow); animation: spin 1s linear infinite; }
.q-icon.success { background: rgba(52,199,89,.12); color: var(--green); }
.q-icon.error   { background: rgba(255,45,85,.12);  color: var(--accent); }

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.q-info { flex: 1; min-width: 0; }
.q-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.q-url-small { font-size: 11px; color: var(--muted); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.q-error-msg { font-size: 11px; color: var(--accent); margin-top: 2px; }

.dl-btn {
  background: rgba(52,199,89,.12); border: 1px solid rgba(52,199,89,.3);
  color: var(--green); border-radius: 8px; padding: 7px 14px;
  font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  text-decoration: none; display: inline-block;
}
.dl-btn:hover { background: rgba(52,199,89,.22); }

/* Summary */
.summary-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.sum-card { flex: 1; min-width: 80px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
.sum-num { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
.sum-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.num-green { color: var(--green); }
.num-red   { color: var(--accent); }
.num-blue  { color: var(--blue); }

.empty-hint { font-size: 13px; color: var(--muted); text-align: center; padding: 16px 0; }

/* Scrollable queue */
.queue-scroll { max-height: 400px; overflow-y: auto; padding-right: 2px; }
.queue-scroll::-webkit-scrollbar { width: 4px; }
.queue-scroll::-webkit-scrollbar-track { background: transparent; }
.queue-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">W</div>
      <div>
        <span class="title">Whimsy</span>
        <span class="version-badge">v3 ONLINE</span>
      </div>
    </div>
    <div class="subtitle">RedNote Smart Downloader — Koi bhi text paste karein, links auto-detect hongi</div>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon icon-input">📋</div>
      <span class="card-label">Kuch bhi paste karein — text, links, sab kuch</span>
    </div>
    <textarea id="raw" placeholder="Yahan kuch bhi paste karein:

http://xhslink.com/o/Ae8i7urzQco
Yeh dekho kitna acha! http://xhslink.com/o/254ThpLp9uF zaroor dekho
https://www.xiaohongshu.com/explore/abc123

Tool khud saari links nikalega." oninput="onInput()"></textarea>

    <div class="opts-row">
      <div class="opt-group">
        <span class="opt-label">Quality</span>
        <select id="quality">
          <option value="best">Best Quality (Original)</option>
          <option value="720">720p</option>
          <option value="480">480p</option>
          <option value="worst">Small Size</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Detected Links -->
  <div class="card" id="links-card" style="display:none">
    <div class="card-header">
      <div class="card-icon icon-links">🔗</div>
      <span class="card-label">Detected links</span>
    </div>
    <div class="links-summary">
      <span class="count-badge badge-green" id="links-badge">0 links</span>
    </div>
    <div class="link-list" id="links-list"></div>
  </div>

  <!-- Download Button -->
  <button class="main-btn" id="dl-btn" onclick="startDownload()" disabled>
    ↓  Download karein
  </button>

  <!-- Progress -->
  <div class="progress-section" id="progress-section" style="display:none">
    <div class="card">
      <div class="progress-header">
        <span class="progress-label" id="prog-label">Downloading...</span>
        <span class="progress-count" id="prog-count">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <div class="current-url" id="current-url"></div>
    </div>
  </div>

  <!-- Queue / Results -->
  <div class="card" id="queue-card" style="display:none">
    <div class="card-header">
      <div class="card-icon icon-queue">📥</div>
      <span class="card-label" id="queue-label">Download queue</span>
    </div>
    <div class="queue-scroll" id="queue-list"></div>

    <!-- Summary -->
    <div id="summary" style="display:none; margin-top:14px;">
      <div class="summary-row">
        <div class="sum-card">
          <div class="sum-num num-green" id="sum-ok">0</div>
          <div class="sum-label">Success</div>
        </div>
        <div class="sum-card">
          <div class="sum-num num-red" id="sum-fail">0</div>
          <div class="sum-label">Failed</div>
        </div>
        <div class="sum-card">
          <div class="sum-num num-blue" id="sum-total">0</div>
          <div class="sum-label">Total</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const BASE = window.location.origin;
  let detectedLinks = [];
  let pollTimer = null;
  let queueItems = [];

  function extractLinksClient(text) {
    const re = /https?:\/\/(www\.)?(xhslink\.com|xiaohongshu\.com)[^\s\u4e00-\u9fff"'<>)\]]+/gi;
    const found = text.match(re) || [];
    return [...new Set(found.map(l => l.replace(/[.,;!?]+$/, '')))];
  }

  function onInput() {
    const text = document.getElementById('raw').value;
    detectedLinks = extractLinksClient(text);
    renderLinks();
  }

  function renderLinks() {
    const card = document.getElementById('links-card');
    const list = document.getElementById('links-list');
    const badge = document.getElementById('links-badge');
    const btn = document.getElementById('dl-btn');

    if (!detectedLinks.length) {
      card.style.display = 'none';
      btn.disabled = true;
      return;
    }

    card.style.display = 'block';
    badge.textContent = `${detectedLinks.length} link${detectedLinks.length > 1 ? 's' : ''} mili`;
    list.innerHTML = detectedLinks.map((l, i) =>
      `<div class="link-row">
        <span class="link-num">${i + 1}.</span>
        <span class="link-url" title="${l}">${l}</span>
      </div>`
    ).join('');
    btn.disabled = false;
  }

  async function startDownload() {
    if (!detectedLinks.length) return;

    const quality = document.getElementById('quality').value;
    const btn = document.getElementById('dl-btn');
    btn.disabled = true;
    btn.textContent = '⏳  Starting...';

    // Init queue UI
    queueItems = detectedLinks.map((url, i) => ({ url, status: 'pending', index: i }));
    renderQueue();
    document.getElementById('queue-card').style.display = 'block';
    document.getElementById('queue-label').textContent = 'Download queue';
    document.getElementById('summary').style.display = 'none';

    try {
      const res = await fetch(`${BASE}/api/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ links: detectedLinks, quality })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error); btn.disabled = false; btn.textContent = '↓  Download karein'; return; }

      pollStatus(data.job_id);
    } catch (e) {
      showError('Server se connect nahi ho saka: ' + e.message);
      btn.disabled = false;
      btn.textContent = '↓  Download karein';
    }
  }

  function pollStatus(jobId) {
    document.getElementById('progress-section').style.display = 'block';

    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`${BASE}/api/status/${jobId}`);
        const job = await res.json();

        const pct = job.total > 0 ? Math.round((job.done / job.total) * 100) : 0;
        document.getElementById('prog-fill').style.width = pct + '%';
        document.getElementById('prog-count').textContent = `${job.done} / ${job.total}`;
        document.getElementById('current-url').textContent = job.current_url ? `Processing: ${job.current_url}` : '';

        if (job.status === 'running') {
          document.getElementById('prog-label').textContent = `Downloading ${job.current_index} of ${job.total}...`;
        }

        // Update queue from results
        if (job.results && job.results.length) {
          job.results.forEach((r, i) => {
            queueItems[i] = { ...queueItems[i], ...r };
          });
          // Mark current as running
          if (job.done < job.total) {
            queueItems[job.done] = { ...queueItems[job.done], status: 'running' };
          }
          renderQueue();
        }

        if (job.status === 'complete') {
          clearInterval(pollTimer);
          onComplete(job);
        }
      } catch (e) {
        // retry silently
      }
    }, 1200);
  }

  function renderQueue() {
    const list = document.getElementById('queue-list');
    list.innerHTML = queueItems.map((item, i) => {
      const status = item.status || 'pending';
      const icons = { pending: '○', running: '↻', success: '✓', error: '✗' };
      const title = item.title || shortUrl(item.url);
      const dlHtml = (status === 'success' && item.file_id)
        ? `<a class="dl-btn" href="${BASE}/api/file/${item.file_id}?name=${encodeURIComponent(item.filename || 'video.mp4')}" download>Download</a>`
        : '';
      const errHtml = (status === 'error')
        ? `<div class="q-error-msg">⚠ ${item.error || 'Failed'}</div>` : '';

      return `
        <div class="queue-item ${status}">
          <div class="q-icon ${status}">${icons[status]}</div>
          <div class="q-info">
            <div class="q-title">${i + 1}. ${escHtml(title)}</div>
            <div class="q-url-small">${item.url}</div>
            ${errHtml}
          </div>
          ${dlHtml}
        </div>`;
    }).join('');
  }

  function onComplete(job) {
    const btn = document.getElementById('dl-btn');
    btn.disabled = false;
    btn.textContent = '↓  Download karein';
    document.getElementById('prog-label').textContent = 'Complete!';
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('current-url').textContent = '';
    document.getElementById('queue-label').textContent = 'Results';

    const ok = job.results.filter(r => r.status === 'success').length;
    const fail = job.results.filter(r => r.status === 'error').length;
    document.getElementById('sum-ok').textContent = ok;
    document.getElementById('sum-fail').textContent = fail;
    document.getElementById('sum-total').textContent = job.total;
    document.getElementById('summary').style.display = 'block';
  }

  function showError(msg) {
    alert('Error: ' + msg);
  }

  function shortUrl(url) {
    try { return new URL(url).pathname.split('/').pop() || url; } catch { return url; }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
