<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedNote Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-2xl mx-auto p-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-red-500 mb-2">RedNote Downloader</h1>
            <p class="text-zinc-400">Paste links → Get all videos in ZIP</p>
        </div>

        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
            <textarea id="text" rows="10" 
                      class="w-full bg-black border border-zinc-600 rounded-2xl p-6 text-white focus:outline-none focus:border-red-500 resize-none"
                      placeholder="Yahan text paste karo jisme xhslink.com ke links hon..."></textarea>

            <button onclick="startDownload()" 
                    id="downloadBtn"
                    class="mt-8 w-full bg-red-600 hover:bg-red-700 py-6 rounded-2xl font-bold text-2xl flex items-center justify-center gap-3 transition-all">
                <i class="fas fa-download"></i> 
                DOWNLOAD ALL VIDEOS AS ZIP
            </button>
        </div>

        <!-- Progress Area -->
        <div id="progressArea" class="hidden mt-10 bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
            <h3 class="text-lg font-semibold mb-6 flex items-center gap-2">
                <i class="fas fa-spinner fa-spin text-red-500"></i> 
                Downloading Videos...
            </h3>
            <div id="progressList" class="space-y-4"></div>
        </div>

        <div id="finalMessage" class="mt-8 text-center text-sm"></div>
    </div>

    <script>
        async function startDownload() {
            const text = document.getElementById('text').value.trim();
            if (!text) {
                alert("Please paste some text containing xhslink links");
                return;
            }

            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

            document.getElementById('progressArea').classList.remove('hidden');
            document.getElementById('finalMessage').innerHTML = '';

            // Extract links
            const urlRegex = /https?:\/\/[^\s<>"]+/g;
            let links = (text.match(urlRegex) || []).filter(u => u.includes('xhslink.com'));
            links = [...new Set(links)];

            if (links.length === 0) {
                alert("No valid xhslink.com links found!");
                resetButton();
                return;
            }

            renderProgress(links);

            // Actual ZIP download call (tumhara purana /download endpoint)
            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ text: text })
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'rednote_videos.zip';
                    a.click();
                    URL.revokeObjectURL(url);

                    document.getElementById('finalMessage').innerHTML = 
                        `<span class="text-green-400 text-lg">✅ All videos downloaded successfully in ZIP!</span>`;
                } else {
                    const err = await res.json().catch(() => ({}));
                    document.getElementById('finalMessage').innerHTML = 
                        `<span class="text-red-400">❌ Failed: ${err.error || "RedNote is blocking downloads"}</span>`;
                }
            } catch (err) {
                document.getElementById('finalMessage').innerHTML = 
                    `<span class="text-red-400">❌ Network Error - RedNote currently blocks direct download</span>`;
            }

            resetButton();
        }

        function renderProgress(links) {
            const container = document.getElementById('progressList');
            container.innerHTML = '';

            links.forEach((link, i) => {
                const item = document.createElement('div');
                item.className = "flex items-center gap-4 bg-zinc-800 rounded-2xl p-4";
                item.innerHTML = `
                    <div class="w-8 h-8 bg-red-600/20 text-red-500 rounded-xl flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-video"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm text-zinc-400">Video ${i+1}</p>
                        <p class="text-white text-sm truncate">${link}</p>
                    </div>
                    <div id="status-${i}" class="text-sm font-medium text-yellow-400">Queued</div>
                `;
                container.appendChild(item);

                // Simple fake progress
                setTimeout(() => {
                    document.getElementById(`status-${i}`).innerHTML = 
                        `<span class="text-green-400"><i class="fas fa-check"></i> Added to ZIP</span>`;
                }, 800 + i * 400);
            });
        }

        function resetButton() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-download"></i> DOWNLOAD ALL VIDEOS AS ZIP`;
        }
    </script>
</body>
</html>
