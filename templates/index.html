<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedNote Direct Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-2xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-center mb-6">RedNote Video Downloader</h1>
        <p class="text-center text-zinc-400 mb-8">Paste text with xhslink → Direct MP4 Download (ZIP)</p>

        <form id="form" class="space-y-4">
            <textarea id="text" rows="8" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-5 focus:outline-none focus:border-red-500" placeholder="Yahan text + links paste karo..."></textarea>
            
            <button type="submit" id="btn" 
                    class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2">
                <span>Download All Videos</span>
            </button>
        </form>

        <div id="status" class="mt-6 text-center text-sm"></div>
    </div>

    <script>
        const form = document.getElementById('form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('text').value.trim();
            if (!text) return alert("Text paste karo!");

            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = `Downloading... <span class="animate-pulse">⏳</span>`;
            status.innerHTML = "Links extract ho rahe hain aur download shuru...";

            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ text })
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'rednote_videos.zip';
                    a.click();
                    URL.revokeObjectURL(url);
                    status.innerHTML = `<span class="text-green-400">✅ Download complete!</span>`;
                } else {
                    const err = await res.json();
                    status.innerHTML = `<span class="text-red-400">❌ ${err.error || 'Download failed'}</span>`;
                }
            } catch (err) {
status.innerHTML = `<span class="text-yellow-400">Trying to download... (RedNote sometimes blocks direct download)</span>`;            }

            btn.disabled = false;
            btn.innerHTML = 'Download All Videos';
        });
    </script>
</body>
</html>
