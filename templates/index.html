<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rednote-downloader v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
        }
        .terminal {
            background: #000000;
            border: 2px solid #00ff41;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }
        .log-line {
            animation: fadeIn 0.4s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-bar {
            height: 6px;
            background: linear-gradient(to right, #00ff41, #00cc33);
        }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-[#00ff41] mb-1 tracking-widest">REDNOTE-DOWNLOADER v2.1</h1>
            <p class="text-[#00cc33] text-sm">By Adnan Laghari • Secure Session</p>
        </div>

        <div class="terminal rounded-xl p-8">
            <!-- Input Area -->
            <div class="mb-6">
                <div class="text-[#00cc33] text-sm mb-2 flex items-center gap-2">
                    <i class="fas fa-terminal"></i> INPUT PAYLOAD
                </div>
                <textarea id="text" rows="8" 
                          class="w-full bg-black border border-[#00ff41]/30 text-[#00ff41] p-5 focus:outline-none focus:border-[#00ff41] font-mono text-sm resize-none"
                          placeholder="Paste your text containing xhslink.com links here..."></textarea>
            </div>

            <button onclick="startCodingDownload()" 
                    id="mainBtn"
                    class="w-full bg-[#00ff41] hover:bg-[#00cc33] text-black font-bold py-5 rounded-lg text-lg tracking-wider transition-all flex items-center justify-center gap-3">
                <i class="fas fa-play"></i> EXECUTE DOWNLOAD SEQUENCE
            </button>

            <!-- Live Log Terminal -->
            <div id="logArea" class="hidden mt-8 bg-black border border-[#00ff41]/20 rounded-lg p-5 h-96 overflow-y-auto font-mono text-sm">
                <div id="logs" class="space-y-1 text-[#00ff41]"></div>
            </div>

            <!-- Overall Progress -->
            <div id="progressArea" class="hidden mt-6">
                <div class="flex justify-between text-xs mb-2 text-[#00cc33]">
                    <span id="statusText">INITIALIZING...</span>
                    <span id="percentText">0%</span>
                </div>
                <div class="bg-[#001a00] h-2 rounded-full overflow-hidden">
                    <div id="progressBar" class="progress-bar w-0 transition-all duration-300"></div>
                </div>
            </div>

            <div id="finalOutput" class="hidden mt-6 text-center text-[#00ff41] font-bold"></div>
        </div>

        <div class="text-center text-[#00cc33]/50 text-xs mt-6">
            SYSTEM READY • NO WATERMARK • HIGH QUALITY MODE
        </div>
    </div>

    <script>
        let logCount = 0;

        function addLog(message, type = 'normal') {
            const logsDiv = document.getElementById('logs');
            const line = document.createElement('div');
            line.className = `log-line flex gap-3 ${type === 'success' ? 'text-green-400' : type === 'error' ? 'text-red-400' : ''}`;
            
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
            
            line.innerHTML = `
                <span class="text-[#00cc33]/60 w-20">[${time}]</span>
                <span>${message}</span>
            `;
            logsDiv.appendChild(line);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            logCount++;
        }

        async function startCodingDownload() {
            const text = document.getElementById('text').value.trim();
            if (!text) {
                alert("ERROR: No input detected. Paste links first.");
                return;
            }

            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> EXECUTING...`;

            // Show terminal
            document.getElementById('logArea').classList.remove('hidden');
            document.getElementById('progressArea').classList.remove('hidden');
            document.getElementById('finalOutput').classList.add('hidden');

            const logsDiv = document.getElementById('logs');
            logsDiv.innerHTML = '';

            addLog("System initialized successfully", "success");
            addLog("Extracting xhslink.com URLs...");

            // Extract links
            const urlRegex = /https?:\/\/[^\s<>"]+/g;
            let links = (text.match(urlRegex) || []).filter(u => u.includes('xhslink.com'));
            links = [...new Set(links)];

            addLog(`Found ${links.length} valid RedNote links`);

            if (links.length === 0) {
                addLog("ERROR: No valid xhslink detected", "error");
                resetButton();
                return;
            }

            addLog("Starting download sequence...");
            addLog("Connecting to RedNote servers...");

            let progress = 0;
            const progressBar = document.getElementById('progressBar');
            const percentText = document.getElementById('percentText');
            const statusText = document.getElementById('statusText');

            const progressInterval = setInterval(() => {
                progress += Math.random() * 9 + 5;
                if (progress > 92) progress = 92;

                progressBar.style.width = `${progress}%`;
                percentText.textContent = `${Math.floor(progress)}%`;
            }, 180);

            try {
                addLog("Sending request to /download endpoint...");

                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ text })
                });

                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                percentText.textContent = '100%';

                if (res.ok) {
                    addLog("All videos downloaded successfully", "success");
                    addLog("Creating ZIP archive...", "success");
                    addLog("ZIP file generated: rednote_videos.zip", "success");

                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'rednote_videos.zip';
                    a.click();
                    URL.revokeObjectURL(url);

                    document.getElementById('finalOutput').innerHTML = 
                        `<span class="text-green-400 text-xl">✓ OPERATION COMPLETED SUCCESSFULLY</span>`;
                    document.getElementById('finalOutput').classList.remove('hidden');
                } else {
                    const err = await res.json().catch(() => ({}));
                    addLog(`ERROR: ${err.error || "Download failed"}`, "error");
                }
            } catch (err) {
                clearInterval(progressInterval);
                addLog("CRITICAL ERROR: Network or server failure", "error");
                addLog("RedNote may be blocking the request", "error");
            }

            resetButton();
        }

        function resetButton() {
            const btn = document.getElementById('mainBtn');
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-play"></i> EXECUTE DOWNLOAD SEQUENCE`;
        }
    </script>
</body>
</html>
