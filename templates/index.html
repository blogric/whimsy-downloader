<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedNote Pro • Professional Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); }
        .neon-text { text-shadow: 0 0 20px rgb(239 68 68); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-3xl mx-auto p-8">

        <!-- Header + Server Info -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-red-600 rounded-2xl flex items-center justify-center text-3xl">🔥</div>
                <h1 class="text-4xl font-bold neon-text">RedNote Pro</h1>
            </div>
            <div class="text-right text-sm">
                <div class="flex items-center gap-2 justify-end">
                    <span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 text-xs font-medium rounded-full flex items-center gap-1">
                        <i class="fas fa-circle"></i> ONLINE
                    </span>
                    <span class="text-zinc-400">Railway • Python 3.12 • yt-dlp Latest</span>
                </div>
                <p class="text-zinc-500 text-xs mt-1">No Watermark • High Quality • Secure</p>
            </div>
        </div>

        <div class="glass rounded-3xl p-10">
            <textarea id="text" rows="9" 
                      class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-7 text-lg focus:outline-none focus:border-red-500 resize-none"
                      placeholder="Paste your text or multiple xhslink.com links here..."></textarea>

            <button onclick="startProfessionalDownload()" 
                    id="mainBtn"
                    class="mt-8 w-full py-7 bg-gradient-to-r from-red-600 to-red-500 hover:from-red-700 hover:to-red-600 rounded-3xl text-2xl font-bold flex items-center justify-center gap-4 shadow-xl shadow-red-500/30 transition-all">
                <i class="fas fa-download"></i>
                DOWNLOAD ALL VIDEOS AS ZIP
            </button>
        </div>

        <!-- Overall Progress -->
        <div id="progressSection" class="hidden mt-12 glass rounded-3xl p-8">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold">Overall Progress</h3>
                <span id="progressText" class="text-red-400 font-medium">0% • Processing videos...</span>
            </div>
            
            <div class="h-4 bg-zinc-800 rounded-3xl overflow-hidden">
                <div id="overallProgressBar" class="h-4 bg-gradient-to-r from-red-500 to-red-600 w-0 transition-all duration-500"></div>
            </div>

            <div id="statusDetail" class="mt-5 text-center text-zinc-400 text-sm"></div>
        </div>

        <div id="finalStatus" class="mt-8 text-center text-lg font-medium"></div>
    </div>

    <script>
        async function startProfessionalDownload() {
            const text = document.getElementById('text').value.trim();
            if (!text) return alert("Please paste text containing xhslink links");

            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Preparing Download...`;

            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('finalStatus').innerHTML = '';

            // Extract links for progress count
            const urlRegex = /https?:\/\/[^\s<>"]+/g;
            const links = (text.match(urlRegex) || []).filter(u => u.includes('xhslink.com'));
            const totalVideos = [...new Set(links)].length || 1;

            // Simulate smooth overall progress
            let progress = 0;
            const progressBar = document.getElementById('overallProgressBar');
            const progressText = document.getElementById('progressText');
            const statusDetail = document.getElementById('statusDetail');

            const progressInterval = setInterval(() => {
                progress += Math.random() * 12 + 6;
                if (progress > 95) progress = 95;
                
                progressBar.style.width = progress + '%';
                progressText.textContent = `${Math.floor(progress)}% • Processing ${Math.floor(totalVideos * progress / 100)} of ${totalVideos} videos`;
            }, 220);

            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ text })
                });

                clearInterval(progressInterval);

                if (res.ok) {
                    progressBar.style.width = '100%';
                    progressText.textContent = `100% • Complete!`;
                    statusDetail.innerHTML = `<span class="text-green-400">All videos processed successfully ✓</span>`;

                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'rednote_videos.zip';
                    a.click();
                    URL.revokeObjectURL(url);

                    document.getElementById('finalStatus').innerHTML = 
                        `<span class="text-green-400 flex items-center justify-center gap-3 text-2xl"><i class="fas fa-check-circle"></i> ZIP Downloaded Successfully!</span>`;
                } else {
                    const err = await res.json().catch(() => ({}));
                    progressBar.style.width = '100%';
                    progressBar.classList.add('!bg-red-500');
                    progressText.innerHTML = `Failed`;
                    document.getElementById('finalStatus').innerHTML = 
                        `<span class="text-red-400">❌ ${err.error || "Download failed - RedNote blocking"}</span>`;
                }
            } catch (e) {
                clearInterval(progressInterval);
                document.getElementById('finalStatus').innerHTML = 
                    `<span class="text-red-400">❌ Network Error</span>`;
            }

            // Reset button
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-download"></i> DOWNLOAD ALL VIDEOS AS ZIP`;
        }
    </script>
</body>
</html>
