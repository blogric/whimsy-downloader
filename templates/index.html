<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedNote Pro Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-3xl mx-auto p-6">
        <h1 class="text-4xl font-bold text-center mb-3 text-red-500">RedNote Pro</h1>
        <p class="text-center text-zinc-400 mb-8">Paste links → See progress → Download ZIP</p>

        <div class="glass border border-zinc-700 rounded-3xl p-8">
            <textarea id="text" rows="8" 
                      class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-6 focus:outline-none focus:border-red-500 text-base"
                      placeholder="Yahan text + xhslink links paste karo..."></textarea>
            
            <button onclick="startProcess()" 
                    id="mainBtn"
                    class="mt-6 w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold text-xl flex items-center justify-center gap-3 transition-all">
                <i class="fas fa-download"></i> START DOWNLOAD PROCESS
            </button>
        </div>

        <div id="resultArea" class="hidden mt-10">
            <h2 class="text-xl font-semibold mb-5">Download Progress</h2>
            <div id="progressList" class="space-y-5"></div>
        </div>

        <div id="finalStatus" class="mt-8 text-center text-sm"></div>
    </div>

    <script>
        let links = [];

        async function startProcess() {
            const text = document.getElementById('text').value.trim();
            if (!text) return alert("Kuch text ya links paste karo!");

            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

            // Extract links
            const urlRegex = /https?:\/\/[^\s<>"]+/g;
            links = (text.match(urlRegex) || []).filter(u => u.includes('xhslink.com'));
            links = [...new Set(links)];

            if (links.length === 0) {
                alert("Koi valid xhslink.com link nahi mila!");
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-download"></i> START DOWNLOAD PROCESS`;
                return;
            }

            document.getElementById('resultArea').classList.remove('hidden');
            renderProgressBars();

            // ZIP ke liye actual call (tumhara purana endpoint)
            try {
                document.getElementById('finalStatus').innerHTML = `<span class="text-yellow-400">Downloading all videos as ZIP...</span>`;

                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ text: text })
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'rednote_videos.zip';
                    a.click();
                    URL.revokeObjectURL(url);

                    document.getElementById('finalStatus').innerHTML = 
                        `<span class="text-green-400 text-lg">✅ ZIP Download Complete! Sab videos aa gaye.</span>`;
                } else {
                    const err = await res.json().catch(() => ({}));
                    document.getElementById('finalStatus').innerHTML = 
                        `<span class="text-red-400">❌ ZIP Failed: ${err.error || 'RedNote blocking kar raha hai'}</span>`;
                }
            } catch (e) {
                document.getElementById('finalStatus').innerHTML = 
                    `<span class="text-red-400">❌ Network error - RedNote currently blocks direct download</span>`;
            }

            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-download"></i> START DOWNLOAD PROCESS`;
        }

        function renderProgressBars() {
            const container = document.getElementById('progressList');
            container.innerHTML = '';

            links.forEach((link, i) => {
                const div = document.createElement('div');
                div.className = "glass rounded-2xl p-5";
                div.innerHTML = `
                    <div class="flex justify-between text-sm mb-3">
                        <span class="text-zinc-400">Video ${i+1}</span>
                        <span id="percent-${i}" class="text-red-400 font-medium">0%</span>
                    </div>
                    <a href="${link}" target="_blank" class="text-white text-sm break-all hover:text-red-300 block mb-4">${link}</a>
                    
                    <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
                        <div id="bar-${i}" class="h-2 bg-red-500 w-0 transition-all duration-700"></div>
                    </div>
                    <div id="status-${i}" class="mt-3 text-xs text-yellow-400">Queued...</div>
                `;
                container.appendChild(div);

                // Fake live progress (kyunki backend single progress nahi de raha)
                simulateProgress(i);
            });
        }

        function simulateProgress(index) {
            let progress = 0;
            const bar = document.getElementById(`bar-${index}`);
            const percent = document.getElementById(`percent-${index}`);
            const status = document.getElementById(`status-${index}`);

            const interval = setInterval(() => {
                progress += Math.random() * 18 + 8;
                if (progress > 92) progress = 92;

                bar.style.width = progress + '%';
                percent.textContent = Math.floor(progress) + '%';

                if (progress > 70) {
                    status.textContent = "Almost done...";
                    status.className = "mt-3 text-xs text-orange-400";
                }
            }, 180);

            // 4-6 second baad complete dikhaye (real download ZIP ke saath hoga)
            setTimeout(() => {
                clearInterval(interval);
                bar.style.width = '100%';
                percent.textContent = '100%';
                status.innerHTML = `<span class="text-green-400">✓ Ready in ZIP</span>`;
                status.className = "mt-3 text-xs text-green-400";
            }, 4500 + index * 300);
        }
    </script>
</body>
</html>
