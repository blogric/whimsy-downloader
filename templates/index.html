<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedNote Pro Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); }
        .neon { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold text-red-500 mb-2">RedNote Pro</h1>
            <p class="text-zinc-400">No Watermark • Premium Quality • Fast Download</p>
        </div>

        <div class="glass border border-red-500/30 rounded-3xl p-8">
            <textarea id="inputText" rows="5" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-5 focus:border-red-500 outline-none text-lg" 
                      placeholder="Yahan pura text ya multiple xhslink paste karo..."></textarea>
            
            <button onclick="extractAndShow()" 
                    class="mt-6 w-full py-5 bg-red-600 hover:bg-red-700 rounded-2xl font-bold text-xl flex items-center justify-center gap-3 transition">
                <i class="fas fa-search"></i> EXTRACT & SHOW VIDEOS
            </button>
        </div>

        <div id="resultSection" class="hidden mt-10">
            <h2 class="text-2xl font-semibold mb-6">Found Videos <span id="linkCount" class="text-red-500"></span></h2>
            <div id="videoList" class="space-y-6"></div>

            <button onclick="downloadAllZip()" 
                    class="mt-10 w-full py-6 bg-gradient-to-r from-red-600 to-rose-600 rounded-3xl text-2xl font-bold flex items-center justify-center gap-3 hover:scale-105 transition">
                <i class="fas fa-file-archive"></i> DOWNLOAD ALL AS ZIP
            </button>
        </div>
    </div>

    <script>
        let currentLinks = [];

        async function extractAndShow() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) return alert("Text paste karo!");

            // Simple frontend extract (backend pe bhi check rahega)
            const urlRegex = /https?:\/\/[^\s<>"]+/g;
            currentLinks = [...text.matchAll(urlRegex)].map(m => m[0]).filter(u => u.includes('xhslink.com'));
            currentLinks = [...new Set(currentLinks)];

            if (currentLinks.length === 0) {
                return alert("Koi valid xhslink nahi mila!");
            }

            renderVideos();
        }

        function renderVideos() {
            const container = document.getElementById('videoList');
            container.innerHTML = '';
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('linkCount').textContent = `(${currentLinks.length})`;

            currentLinks.forEach((link, i) => {
                const div = document.createElement('div');
                div.className = "glass border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <p class="text-red-400 text-sm">Video ${i+1}</p>
                            <a href="${link}" target="_blank" class="block text-white break-all hover:text-red-300">${link}</a>
                        </div>
                        <button onclick="startSingleDownload(${i}, this)" 
                                class="px-8 py-3 bg-red-600 hover:bg-red-700 rounded-2xl font-medium whitespace-nowrap">
                            Download MP4
                        </button>
                    </div>
                    <div id="status-${i}" class="mt-5 text-sm"></div>
                    <div class="h-2.5 bg-zinc-800 rounded-full mt-3 overflow-hidden">
                        <div id="bar-${i}" class="h-2.5 bg-red-500 w-0 transition-all duration-300"></div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function startSingleDownload(index, btn) {
            const link = currentLinks[index];
            const statusDiv = document.getElementById(`status-${index}`);
            const progressBar = document.getElementById(`bar-${index}`);

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Downloading...`;
            statusDiv.innerHTML = `<span class="text-yellow-400">Starting download...</span>`;

            try {
                const res = await fetch('/download_single', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ url: link })
                });

                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `rednote_video_${index+1}.mp4`;
                    a.click();
                    URL.revokeObjectURL(url);

                    statusDiv.innerHTML = `<span class="text-green-400 flex items-center gap-2"><i class="fas fa-check-circle"></i> Download Completed ✓</span>`;
                    progressBar.style.width = '100%';
                    progressBar.classList.add('!bg-green-500');
                } else {
                    const err = await res.json();
                    statusDiv.innerHTML = `<span class="text-red-400">Failed: ${err.error || 'Unknown error'}</span>`;
                }
            } catch (e) {
                statusDiv.innerHTML = `<span class="text-red-400">Network Error</span>`;
            }

            btn.disabled = false;
            btn.innerHTML = 'Download MP4';
        }

        async function downloadAllZip() {
            const text = document.getElementById('inputText').value;
            // ZIP ke liye simple alert for now (agar chaho to baad mein add kar sakte hain)
            alert("ZIP download feature abhi under maintenance hai kyunki RedNote blocking kar raha hai.\n\nSingle video download try karo.");
        }
    </script>
</body>
</html>
